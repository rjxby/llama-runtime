name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - 'main'

jobs:
  build-test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Setup Cache for llama.cpp
      uses: actions/cache@v4
      with:
        path: vendor/llama
        key: ${{ runner.os }}-llama-${{ hashFiles('Makefile', '.env.*') }}

    - name: Initialize dependencies
      run: |
        # Generate a temporary .env for the runner's execution
        echo "PLATFORM=macos-arm64" > .env
        echo "LLAMA_VERSION=b7932" >> .env
        echo "DOTNET_RUNTIME=osx-arm64" >> .env
        make init

    - name: Build Native Adapter
      run: make native-build

    - name: Build .NET Solution
      run: dotnet build src/llama-runtime.slnx -c Release

    - name: Run Unit Tests
      run: dotnet test src/llama-runtime.slnx -c Release --no-build --verbosity normal --filter "Category=Unit"
