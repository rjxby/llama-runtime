name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-assets:
    name: Build macOS Asset
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Initialize dependencies
      run: |
        # Generate a temporary .env for the runner's execution
        echo "PLATFORM=macos-arm64" > .env
        echo "LLAMA_VERSION=b7932" >> .env
        echo "DOTNET_RUNTIME=osx-arm64" >> .env
        make init

    - name: Build Native Adapter
      run: make native-build

    - name: Publish gRPC Runtime
      run: |
        make llama-runtime-grpc-build
        # The makefile outputs to build/llama-runtime-grpc
        cd build/llama-runtime-grpc
        tar -czf ../../llama-runtime-grpc-osx-arm64.tar.gz .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: llama-runtime-grpc-osx-arm64
        path: llama-runtime-grpc-osx-arm64.tar.gz

  create-release:
    name: Create Release
    needs: build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
